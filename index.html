<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Countdown Giappone</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="overlay"></div>

  <audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <div class="container">
    <h1>🇯🇵 Il Giappone ti aspetta</h1>

    <p id="testo">Manca ancora:</p>

    <div id="countdown">
      <div><span id="giorni"></span><br>Giorni</div>
      <div><span id="ore"></span><br>Ore</div>
      <div><span id="minuti"></span><br>Minuti</div>
      <div><span id="secondi"></span><br>Secondi</div>
    </div>

    <h2 id="finale">bobi manca poco al cibo 🍜</h2>
  </div>

  <script src="bobi.js"></script>

</body>
</html>
